<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="description" content="Single-metro detail: job-posting demand per 1,000 workers for one U.S. metro, from calibrated Adzuna counts normalized by BLS labor force.">
<title>Single-Metro View — Metro Labor Demand</title>
<link rel="icon" href="favicon.svg">
<link rel="stylesheet" href="fonts.css">
<style>
  /* shared design tokens (kept in step with index.html) */
  :root{
    --paper:#f2f5f8; --panel:#ffffff; --ink:#131b26; --muted:#5d6b80;
    --faint:#8593a6; --rule:#dde3ec; --hair:#e9edf3;
    --over:#b4552a; --under:#2f6ea3; --under-soft:#cbdcea; --spine:#b3bfce;
    --serif:"Fraunces",Georgia,"Times New Roman",serif;
    --sans:"IBM Plex Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#0d131b; --panel:#141c26; --ink:#e7edf4; --muted:#94a2b6;
      --faint:#6d7c91; --rule:#25303d; --hair:#1c2530;
      --over:#e08a5c; --under:#5ea6d8; --under-soft:#1e2c3a; --spine:#38475a;
    }
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
       font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;}
  .shell{max-width:1000px;margin:0 auto;padding:0 28px;}
  .back{display:inline-block;margin:26px 0 0;font-family:var(--mono);font-size:11.5px;
        letter-spacing:.08em;text-transform:uppercase;color:var(--under);
        text-decoration:none;}
  .back:hover{color:var(--ink);}
  header{padding:14px 0 26px;border-bottom:2px solid var(--ink);}
  .eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.16em;
           text-transform:uppercase;color:var(--muted);}
  h1{font-family:var(--serif);font-weight:500;font-size:clamp(32px,5.5vw,52px);
     line-height:1.03;letter-spacing:-.015em;margin:14px 0 0;}
  .standfirst{margin:16px 0 0;max-width:58ch;color:var(--muted);font-size:16px;}

  .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:28px;padding:30px 0 20px;}
  .card{background:var(--panel);border:1px solid var(--rule);border-radius:12px;padding:18px;}
  svg{width:100%;height:auto;display:block;}
  .maparea{fill:var(--under);stroke:var(--paper);stroke-width:1.5;}
  .maplabel{font-family:var(--mono);font-size:11px;letter-spacing:.08em;
            text-transform:uppercase;fill:var(--faint);}

  .hero{padding:4px 2px;}
  .hlabel{font-family:var(--mono);font-size:11px;letter-spacing:.12em;
          text-transform:uppercase;color:var(--faint);}
  .hnum{font-family:var(--serif);font-weight:500;font-size:clamp(52px,9vw,84px);
        line-height:.95;letter-spacing:-.02em;margin:6px 0 2px;}
  .hunit{font-size:15px;color:var(--muted);}
  .range{margin-top:16px;display:flex;gap:22px;flex-wrap:wrap;}
  .range div{font-family:var(--mono);font-size:12px;color:var(--muted);}
  .range b{display:block;font-size:20px;color:var(--ink);font-weight:500;margin-top:2px;}
  .rowline{display:flex;justify-content:space-between;padding:9px 0;
           border-bottom:1px solid var(--hair);font-size:13.5px;}
  .rowline:last-child{border-bottom:0;}
  .rowline span:last-child{font-family:var(--mono);color:var(--muted);}
  .note{font-size:12.5px;color:var(--muted);line-height:1.6;margin-top:14px;}
  .note a{color:var(--under);}
  footer{border-top:2px solid var(--ink);padding:20px 0 56px;
         font-family:var(--mono);font-size:11px;color:var(--faint);
         letter-spacing:.03em;line-height:1.7;}
  @media (max-width:720px){.shell{padding:0 18px;}.grid{grid-template-columns:1fr;gap:18px;}}
</style>
</head>
<body>
<div class="shell">
  <a class="back" href="index.html">← The deviation index</a>
  <header>
    <div class="eyebrow" id="eyebrow">Single-metro view</div>
    <h1 id="title">—</h1>
    <p class="standfirst">One metro's job-posting demand normalized by its labor
    force. A single cell of the eventual choropleth — the reason the map is
    subordinate to the index: a rate needs a comparison to mean anything.</p>
  </header>

  <div class="grid">
    <div class="card"><svg id="map" viewBox="0 0 560 440" role="img"
         aria-label="Metro boundary"></svg></div>
    <div>
      <div class="hero card">
        <div class="hlabel">Postings per 1,000 workers</div>
        <div class="hnum" id="rate">—</div>
        <div class="hunit" id="ratectx"></div>
        <div class="range" id="range"></div>
      </div>
      <div class="card" style="margin-top:16px" id="detail"></div>
    </div>
  </div>

  <footer id="foot"></footer>
</div>

<script>
// Manual equirectangular projection (longitude scaled by cos(latitude)) — a
// single polygon does not need d3, so this page ships with no dependencies.
function projectPaths(geo, W, H, pad){
  const polys = geo.features.flatMap(f =>
    f.geometry.type === "MultiPolygon" ? f.geometry.coordinates : [f.geometry.coordinates]);
  let minx=1e9,maxx=-1e9,miny=1e9,maxy=-1e9;
  polys.forEach(p=>p.forEach(r=>r.forEach(([lo,la])=>{
    minx=Math.min(minx,lo);maxx=Math.max(maxx,lo);miny=Math.min(miny,la);maxy=Math.max(maxy,la);})));
  const k=Math.cos((miny+maxy)/2*Math.PI/180);
  const sw=(maxx-minx)*k, sh=maxy-miny;
  const s=Math.min((W-2*pad)/sw,(H-2*pad)/sh);
  const ox=(W-s*sw)/2, oy=(H-s*sh)/2;
  const X=lo=>ox+(lo*k-minx*k)*s, Y=la=>H-(oy+(la-miny)*s);
  return polys.map(p=>p.map(r=>"M"+r.map(([lo,la])=>X(lo).toFixed(1)+" "+Y(la).toFixed(1)).join("L")+"Z").join(" "));
}
const fmt = n => n==null ? "—" : n.toLocaleString();

Promise.all([
  fetch("data/18140.json").then(r=>r.json()),
  fetch("data/cbsa_18140.geojson").then(r=>r.json())
]).then(([d, geo])=>{
  document.getElementById("eyebrow").textContent = `Single-metro view · CBSA ${d.cbsa}`;
  document.getElementById("title").textContent = d.name;

  const paths = projectPaths(geo, 560, 440, 26);
  document.getElementById("map").innerHTML =
    paths.map(p=>`<path class="maparea" d="${p}"/>`).join("") +
    `<text class="maplabel" x="14" y="428">${d.name} metro boundary</text>`;

  document.getElementById("rate").textContent = d.view1_postings_per_1000 ?? "—";
  document.getElementById("ratectx").textContent =
    `across the ${d.name} labor market`;
  const v = d.view1_range_per_1000;
  document.getElementById("range").innerHTML =
    `<div>Distinct estimate<b>${v.distinct ?? "—"}</b></div>
     <div>Raw, with reposts<b>${v.raw_with_reposts ?? "—"}</b></div>
     <div>Labor force<b>${fmt(d.labor_force.labor_force)}</b></div>`;

  const vol = d.volume;
  document.getElementById("detail").innerHTML =
    `<div class="rowline"><span>Calibrated posting count</span><span>${fmt(vol.count)} × f_m ${vol.f_m}</span></div>
     <div class="rowline"><span>CBSA-bounded volume</span><span>${fmt(vol.volume)}</span></div>
     <div class="rowline"><span>Distinct (reposts removed)</span><span>${fmt(vol.distinct_estimate)}</span></div>
     <div class="rowline"><span>Labor force (BLS LAUS)</span><span>${fmt(d.labor_force.labor_force)} · ${d.labor_force.as_of}</span></div>
     <div class="note">Volume is a calibrated estimate, not a census: a radius
     count × the in-CBSA fraction of accurately-reported counties. Sector detail
     — where this metro's mix departs from national — lives in
     <a href="index.html">the deviation index</a>, which uses unbiased category
     counts instead of a rank-biased sample.</div>`;

  document.getElementById("foot").textContent =
    `${d.meta.threshold_note} Coder: ${d.meta.coder}. Generated ${d.generated_at}. ` +
    `Job-posting demand, not employment.`;
}).catch(e=>{
  document.getElementById("title").textContent = "Couldn't load metro data";
  document.getElementById("foot").textContent =
    `${e}. Run python pipeline/metro_map.py, then serve this directory over HTTP.`;
});
</script>
</body>
</html>
