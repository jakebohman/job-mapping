<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="description" content="Single-metro detail: hiring intensity (job postings per 1,000 workers) and the sector mix for any U.S. metro.">
<title>Metro Detail · Job Maps</title>
<link rel="icon" href="favicon.svg">
<link rel="stylesheet" href="fonts.css">
<style>
  /* shared design tokens (kept in step with index.html) */
  :root{
    --paper:#f2f5f8; --panel:#ffffff; --ink:#131b26; --muted:#5d6b80;
    --faint:#8593a6; --rule:#dde3ec; --hair:#e9edf3;
    --over:#b4552a; --under:#2f6ea3; --nodata:#c8cfd9;
    --serif:"Fraunces",Georgia,"Times New Roman",serif;
    --sans:"IBM Plex Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#0d131b; --panel:#141c26; --ink:#e7edf4; --muted:#94a2b6;
      --faint:#6d7c91; --rule:#25303d; --hair:#1c2530;
      --over:#e08a5c; --under:#5ea6d8; --nodata:#2c3949;
    }
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
       font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;}
  .shell{max-width:1000px;margin:0 auto;padding:0 28px;}
  .pagenav{display:flex;gap:20px;padding:20px 0 0;font-family:var(--mono);
           font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;}
  .pagenav a{color:var(--faint);text-decoration:none;padding-bottom:3px;}
  .pagenav a.on{color:var(--ink);border-bottom:2px solid var(--ink);}
  .pagenav a:hover{color:var(--ink);}
  header{padding:14px 0 22px;border-bottom:2px solid var(--ink);}
  .eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.16em;
           text-transform:uppercase;color:var(--muted);}
  h1{font-family:var(--serif);font-weight:500;font-size:clamp(30px,5.2vw,50px);
     line-height:1.03;letter-spacing:-.015em;margin:12px 0 0;}
  .standfirst{margin:14px 0 0;max-width:58ch;color:var(--muted);font-size:16px;}
  .picker{margin:16px 0 0;font-family:var(--mono);font-size:11.5px;
          letter-spacing:.08em;text-transform:uppercase;color:var(--faint);}
  .picker .plabel{display:block;padding-left:12px;}
  .picker select{display:block;margin-top:6px;font-family:var(--sans);font-size:15px;
                 text-transform:none;letter-spacing:0;padding:8px 11px;
                 border:1px solid var(--rule);border-radius:8px;background:var(--panel);
                 color:var(--ink);max-width:340px;width:100%;}

  .grid-top,.grid-bottom{display:grid;grid-template-columns:1.05fr .95fr;gap:28px;}
  .grid-top{padding:28px 0 0;align-items:stretch;}   /* map + rate card share a height */
  .grid-bottom{padding:16px 0 20px;align-items:start;} /* sector boxes size independently */
  .card{background:var(--panel);border:1px solid var(--rule);border-radius:12px;padding:18px;}
  svg{width:100%;height:auto;display:block;}
  .maparea{fill:var(--under);stroke:var(--paper);stroke-width:1.5;}
  .maplabel{font-family:var(--mono);font-size:11px;letter-spacing:.08em;
            text-transform:uppercase;fill:var(--faint);}

  .hlabel{font-family:var(--mono);font-size:11px;letter-spacing:.12em;
          text-transform:uppercase;color:var(--faint);}
  .hnum{font-family:var(--serif);font-weight:500;font-size:clamp(48px,8.5vw,80px);
        line-height:.95;letter-spacing:-.02em;margin:6px 0 2px;}
  .hnum.gray{color:var(--faint);font-size:clamp(26px,5vw,40px);}
  .hunit{font-size:13.5px;color:var(--muted);}
  .rowline{display:flex;justify-content:space-between;gap:12px;padding:9px 0;
           border-bottom:1px solid var(--hair);font-size:13.5px;}
  .rowline:last-child{border-bottom:0;}
  .rowline span:last-child{font-family:var(--mono);color:var(--muted);}
  .sec-h{font-family:var(--mono);font-size:10px;letter-spacing:.12em;
         text-transform:uppercase;margin:2px 0 5px;font-weight:600;}
  .sec-h.later{margin-top:14px;}
  .srow{display:flex;justify-content:space-between;align-items:baseline;gap:10px;
        padding:5px 0;border-bottom:1px solid var(--hair);font-size:13.5px;}
  .srow:last-of-type{border-bottom:0;}
  .srow .sv{font-family:var(--mono);font-size:12.5px;font-weight:600;white-space:nowrap;}
  .srow.o .sv{color:var(--over);} .srow.u .sv{color:var(--under);}
  .note{font-size:12.5px;color:var(--muted);line-height:1.6;margin-top:12px;}
  .note a{color:var(--under);}
  .seeall{margin:9px 0 2px;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;
          text-transform:uppercase;color:var(--under);background:none;border:0;
          padding:5px 0;cursor:pointer;}
  .seeall:hover{text-decoration:underline;}
  footer{border-top:2px solid var(--ink);padding:20px 0 56px;
         font-family:var(--mono);font-size:11px;color:var(--faint);
         letter-spacing:.03em;line-height:1.7;}
  @media (max-width:720px){.shell{padding:0 18px;}
    .grid-top,.grid-bottom{grid-template-columns:1fr;gap:18px;}
    .grid-top{padding-bottom:0;}.grid-bottom{padding-top:18px;}}
</style>
</head>
<body>
<div class="shell">
  <nav class="pagenav">
    <a href="index.html">US map</a>
    <a href="sectors.html">Sector index</a>
    <a class="on" href="map.html">Metro detail</a>
  </nav>
  <header>
    <h1 id="title">—</h1>
    <p class="standfirst">Any metro's hiring intensity (job postings per 1,000
    workers) and where its mix of open jobs departs from the national pattern.</p>
    <div class="picker"><span class="plabel">Choose a metro</span><select id="picker"></select></div>
  </header>

  <div class="grid-top">
    <div class="card"><svg id="map" viewBox="0 0 560 440" role="img"
         aria-label="Metro boundary"></svg></div>
    <div class="hero card">
      <div class="hlabel">Postings per 1,000 workers</div>
      <div class="hnum" id="rate">—</div>
      <div class="hunit" id="ratectx"></div>
      <div class="hunit" id="updated" style="margin-top:6px;color:var(--faint)"></div>
      <div id="detail" style="margin-top:14px"></div>
    </div>
  </div>
  <div class="grid-bottom">
    <div class="card" id="sectors"></div>
    <div class="card" id="openings"></div>
  </div>

  <footer id="foot"></footer>
</div>

<script>
// Manual equirectangular projection (longitude scaled by cos(latitude)) — a
// single metro polygon does not need d3, so this page ships with no dependencies.
function projectPaths(features, W, H, pad){
  const polys = features.flatMap(f =>
    f.geometry.type === "MultiPolygon" ? f.geometry.coordinates : [f.geometry.coordinates]);
  let minx=1e9,maxx=-1e9,miny=1e9,maxy=-1e9;
  polys.forEach(p=>p.forEach(r=>r.forEach(([lo,la])=>{
    minx=Math.min(minx,lo);maxx=Math.max(maxx,lo);miny=Math.min(miny,la);maxy=Math.max(maxy,la);})));
  const k=Math.cos((miny+maxy)/2*Math.PI/180);
  const sw=(maxx-minx)*k, sh=maxy-miny;
  const s=Math.min((W-2*pad)/sw,(H-2*pad)/sh);
  const ox=(W-s*sw)/2, oy=(H-s*sh)/2;
  const X=lo=>ox+(lo*k-minx*k)*s, Y=la=>H-(oy+(la-miny)*s);
  return polys.map(p=>p.map(r=>"M"+r.map(([lo,la])=>X(lo).toFixed(1)+" "+Y(la).toFixed(1)).join("L")+"Z").join(" "));
}
const fmt = n => n==null ? "—" : n.toLocaleString();
const sectorName = s => s.replace(/\s*Jobs$/,"");
const metroName = full => {
  const city = full.split(",")[0].split("-")[0].trim();
  const st = (full.split(",")[1] || "").trim().split(/[-/]/)[0].trim();  // first state
  return st ? `${city}, ${st}` : city;                 // "Baltimore, MD"; "Washington, DC"
};
const nocache = {cache:"no-store"};

Promise.all([
  fetch("data/national.json", nocache).then(r=>r.json()),
  fetch("data/us_metros.geojson", nocache).then(r=>r.json()),
  fetch("data/outliers.json", nocache).then(r=>r.json()).catch(()=>({by_metro:{}})),
]).then(([nat, metros, sect])=>{
  const byCbsa={}; nat.metros.forEach(m=>byCbsa[m.cbsa]=m);
  const rank={}; nat.metros.filter(m=>m.rate!=null).forEach((m,i)=>rank[m.cbsa]=i+1);
  const shadedN = nat.metros.filter(m=>!m.below_threshold).length;
  const byMetro = (sect && sect.by_metro) || {};
  const shares = (sect && sect.category_shares) || {};
  const featByCode={}; metros.features.forEach(f=>featByCode[f.properties.GEOID]=f);

  // picker: every metro, alphabetical
  const sel=document.getElementById("picker");
  sel.innerHTML = nat.metros.slice().sort((a,b)=>a.name.localeCompare(b.name))
    .map(m=>`<option value="${m.cbsa}">${m.name}</option>`).join("");

  let code = new URLSearchParams(location.search).get("metro");
  if(!byCbsa[code]) code = byCbsa["18140"] ? "18140" : nat.metros[0].cbsa;

  function render(code){
    const rec = byCbsa[code]; if(!rec) return;
    sel.value = code;
    history.replaceState(null, "", `?metro=${code}`);
    document.getElementById("title").textContent = rec.name;

    const feat = featByCode[code];
    document.getElementById("map").innerHTML = feat
      ? projectPaths([feat],560,440,26).map(p=>`<path class="maparea" d="${p}"/>`).join("")
        + `<text class="maplabel" x="14" y="428">${metroName(rec.name)} metro boundary</text>`
      : `<text class="maplabel" x="50%" y="50%" text-anchor="middle">boundary unavailable</text>`;

    const shaded = rec.rate!=null;
    const rateEl = document.getElementById("rate");
    rateEl.textContent = shaded ? rec.rate.toFixed(1) : "Not rated";
    rateEl.className = shaded ? "hnum" : "hnum gray";
    document.getElementById("ratectx").textContent = shaded
      ? `#${rank[code]} of ${shadedN} metros by hiring intensity`
      : "below the measurement threshold: radius-swamped by a larger neighbor, or no labor-force figure";

    document.getElementById("detail").innerHTML =
      `<div class="rowline"><span>Raw postings in search radius</span><span>${fmt(rec.count)}</span></div>
       <div class="rowline"><span>Share actually in the metro (f_m)</span><span>${rec.f_m}</span></div>
       <div class="rowline"><span>Distinct in-metro estimate</span><span>${fmt(rec.effective)}</span></div>
       <div class="rowline"><span>Labor force (BLS LAUS)</span><span>${fmt(rec.labor_force)}</span></div>`;

    const bm = byMetro[code];
    // "Last updated" = later of the national build and this metro's rolling sector
    // fetch (ISO-8601 UTC strings compare lexicographically).
    const upIso = (bm && bm.fetched_at && bm.fetched_at > nat.generated_at)
      ? bm.fetched_at : nat.generated_at;
    document.getElementById("updated").textContent = "Last updated " + upIso.slice(0,10);

    const srow=(c,cls)=>`<div class="srow ${cls}"><span>${sectorName(c.category)}</span><span class="sv">${c.ratio.toFixed(1)}×</span></div>`;
    document.getElementById("sectors").innerHTML = bm
      ? `<div class="sec-h" style="color:var(--over)">Over-indexed sectors</div>
         ${(bm.over||[]).map(c=>srow(c,"o")).join("") || '<div class="note">None above the national mix.</div>'}
         <div class="sec-h later" style="color:var(--under)">Under-indexed sectors</div>
         ${(bm.under||[]).map(c=>srow(c,"u")).join("") || '<div class="note">None below.</div>'}
         <div class="note"><a href="sectors.html?metro=${code}">See ${metroName(rec.name)} in the sector index →</a></div>`
      : `<div class="sec-h">Sector mix</div><div class="note">Sector detail is
         collected on a rolling schedule and hasn't reached this metro yet.
         <a href="sectors.html">Browse the sector index →</a></div>`;

    // Job openings by sector, descending. Each sector's share of the metro's
    // postings applied to the distinct in-metro estimate (rec.effective), so the
    // list sums to that figure — not the inflated in-radius count.
    const cs = shares[code], est = rec.effective;
    const openEl = document.getElementById("openings");
    if(cs && est){
      const rows = Object.entries(cs).map(([cat,sh])=>({cat, n:Math.round(sh*est)}))
        .filter(r=>r.n>0).sort((a,b)=>b.n-a.n);
      const orow = r=>`<div class="srow"><span>${sectorName(r.cat)}</span><span class="sv">${fmt(r.n)}</span></div>`;
      const TOPN=8, rest=rows.slice(TOPN);
      openEl.innerHTML =
        `<div class="sec-h">Job openings by sector (estimated)</div>`
        + rows.slice(0,TOPN).map(orow).join("")
        + (rest.length ? `<div id="openrest" hidden>${rest.map(orow).join("")}</div>`
            + `<button class="seeall" id="seeall">See all ${rows.length} sectors</button>` : "")
        + `<div class="note">Each sector's share of the metro's distinct in-metro estimate.</div>`;
      const btn=document.getElementById("seeall");
      if(btn) btn.onclick=()=>{ document.getElementById("openrest").hidden=false; btn.remove(); };
    } else {
      openEl.innerHTML = `<div class="sec-h">Job openings by sector (estimated)</div><div class="note">`
        + `Sector detail is collected on a rolling schedule and hasn't reached this metro yet.</div>`;
    }

    document.getElementById("foot").textContent =
      `Job postings from ${nat.metros_covered} of ${nat.metros_total} metros · `
      + `Sector data from ${(sect&&sect.metros_sampled)||0} of ${nat.metros_covered} metros · `
      + `Updated ${nat.generated_at.slice(0,10)}`;
  }

  sel.addEventListener("change", ()=>render(sel.value));
  render(code);
}).catch(e=>{
  document.getElementById("title").textContent = "Couldn't load metro data";
  document.getElementById("foot").textContent =
    `${e}. Run python pipeline/build_national.py (and pipeline/panel.py for sector detail), then serve this directory over HTTP.`;
});
</script>
</body>
</html>
