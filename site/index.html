<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Metro Labor Market Outliers</title>
<style>
  :root { --ink:#1a2233; --muted:#5b6b82; --line:#e2e8f2; --up:#c2410c; --down:#1d4ed8; --card:#fff; --bg:#f6f8fb; }
  @media (prefers-color-scheme: dark){
    :root{ --ink:#e8edf5; --muted:#95a3b8; --line:#2a3345; --up:#fb923c; --down:#60a5fa; --card:#161c28; --bg:#0e131c; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:15px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  .head { padding:26px 24px 6px; max-width:940px; margin:0 auto; }
  h1 { margin:0 0 4px; font-size:22px; }
  .sub { color:var(--muted); font-size:13.5px; }
  .wrap { max-width:940px; margin:0 auto; padding:12px 24px 40px; }
  .row { background:var(--card); border:1px solid var(--line); border-radius:10px;
         padding:13px 16px; margin:9px 0; display:grid;
         grid-template-columns:60px 1fr 160px; gap:14px; align-items:center; }
  .mult { font-weight:700; font-size:17px; text-align:center; font-variant-numeric:tabular-nums; }
  .mult.up{ color:var(--up); } .mult.down{ color:var(--down); }
  .sent { font-size:14.5px; }
  .meta { color:var(--muted); font-size:12px; margin-top:2px; }
  .bars .barlbl { font-size:10.5px; color:var(--muted); display:flex; justify-content:space-between; }
  .bar { height:7px; border-radius:4px; margin:2px 0 6px; background:#00000010; }
  .bar > span { display:block; height:100%; border-radius:4px; }
  .bar.m > span{ background:var(--up); } .bar.n > span{ background:var(--muted); opacity:.55; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px;
          padding:14px 16px; margin:14px 0; font-size:13px; color:var(--muted); }
  a { color:var(--down); }
  @media (max-width:600px){ .row{ grid-template-columns:52px 1fr; } .bars{ display:none; } }
</style>
</head>
<body>
<div class="head">
  <h1>Where metro hiring demand is unusual</h1>
  <div class="sub">Each metro's job-category mix vs. the national mix, ranked by how far it deviates. The list does the looking — no map required.</div>
</div>
<div class="wrap" id="wrap">
  <div class="card">Loading… run <code>python panel.py</code> and serve this directory over HTTP.</div>
</div>
<script>
fetch("data/outliers.json").then(r=>r.json()).then(d=>{
  const wrap = document.getElementById("wrap");
  const maxShare = Math.max(...d.outliers.flatMap(o=>[o.share_metro,o.share_national]), 0.01);
  const rows = d.outliers.map(o=>{
    const up = o.ratio >= 1;
    const pct = x => (x*100).toFixed(0)+"%";
    return `<div class="row">
      <div class="mult ${up?'up':'down'}">${o.ratio.toFixed(1)}×</div>
      <div>
        <div class="sent">${o.sentence}</div>
        <div class="meta">${o.metro} · ${o.category} · ${o.n.toLocaleString()} postings</div>
      </div>
      <div class="bars">
        <div class="barlbl"><span>this metro</span><span>${pct(o.share_metro)}</span></div>
        <div class="bar m"><span style="width:${(o.share_metro/maxShare*100).toFixed(0)}%"></span></div>
        <div class="barlbl"><span>national</span><span>${pct(o.share_national)}</span></div>
        <div class="bar n"><span style="width:${(o.share_national/maxShare*100).toFixed(0)}%"></span></div>
      </div>
    </div>`;
  }).join("");
  wrap.innerHTML = rows + `
    <div class="card">
      <strong>Method.</strong> ${d.method}<br><br>
      ${d.metros_sampled} metros · basis: ${d.basis} · generated ${d.generated_at}.<br>
      Job-posting demand, not employment; Adzuna categories, not O*NET occupations
      (the SOC path needs a representative text source — see PROJECT.md).
      <a href="map.html">View the single-metro choropleth →</a>
    </div>`;
}).catch(e=>{
  document.getElementById("wrap").innerHTML =
    `<div class="card">No data yet (${e}). Run <code>python panel.py</code>, then serve over HTTP.</div>`;
});
</script>
</body>
</html>
